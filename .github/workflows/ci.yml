name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: vint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          # vint imports the legacy `pkg_resources`, which setuptools 81 removed.
          # Pin Python 3.12 (its stdlib still supports the old setuptools) and an
          # older setuptools that still ships pkg_resources.
          python-version: "3.12"
      - name: Install vim-vint
        run: pip install "setuptools<81" vim-vint
      - name: Lint Vimscript
        run: vint ftdetect ftplugin syntax
