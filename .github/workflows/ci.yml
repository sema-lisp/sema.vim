name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: vint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install vim-vint
        # vint imports pkg_resources, which Python 3.12+ no longer bundles
        # (setuptools was dropped from the default install); add it explicitly.
        run: pip install setuptools vim-vint
      - name: Lint Vimscript
        run: vint ftdetect ftplugin syntax
