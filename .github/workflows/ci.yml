name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: vint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install vim-vint
        run: pip install vim-vint
      - name: Lint Vimscript
        run: vint ftdetect ftplugin syntax
